# Publishes the server image to GHCR. ADR-0002 Phase 2.
#
# Tagging scheme (docker/metadata-action):
#   - every push to main        -> ghcr.io/<owner>/fax-trident:sha-<short>
#   - release tag vX.Y.Z        -> :X.Y.Z and :latest (Phase 4 tags trigger
#                                  this same workflow; release.yml handles
#                                  the GitHub Release itself)
#
# Auth is the ambient GITHUB_TOKEN with packages:write — no new secrets,
# per the ADR's "GitHub-native, target-agnostic" constraint. The image is
# built from the existing Dockerfile, unmodified: server module only, the
# desktop's JavaFX deps never enter the image (see Dockerfile comments).
#
# CI (ci.yml) already smoke-builds the Dockerfile on every push/PR, so a
# failure here on main should be rare and means something environmental.

name: Docker publish

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push server image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the repo path for us
          # (RicheyWorks -> richeyworks); OCI requires lowercase.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via the Actions cache backend. The Dockerfile's
          # poms-then-sources layering makes this effective: dependency
          # resolution is only re-run when a pom changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
